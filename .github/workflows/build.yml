name: Build Android Native Library

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Force Fix Environment & Build
      run: |
        # 1. توحيد اسم المجلد إجبارياً ليكون app وتجنب مشكلة الأحرف
        mv App app 2>/dev/null || true
        
        # 2. إنشاء ملف settings.gradle الصحيح إجبارياً لتجنب أي تعارض
        echo "rootProject.name = 'JawakerCheto'" > settings.gradle
        echo "include ':app'" >> settings.gradle
        
        # 3. البناء المباشر بدون الاعتماد على مسار محدد
        gradle assembleRelease

    - name: Upload libsystem.so
      uses: actions/upload-artifact@v4
      with:
        name: Jawaker-Cheto-Lib
        # هذا السطر السحري سيبحث عن المكتبة في أي مجلد فرعي ويرفعها لك
        path: '**/libsystem.so'
