name: Build Android Native Library

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # هذا السطر يسمح لك بتشغيل البناء يدوياً

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Prepare Gradle and Build
      run: |
        gradle wrapper
        chmod +x gradlew
        ./gradlew :app:assembleRelease

    - name: Upload libsystem.so
      uses: actions/upload-artifact@v4
      with:
        name: Jawaker-Cheto-Lib
        # هذا المسار يبحث عن أي ملف .so تم إنشاؤه ويرفعه لك
        path: app/build/intermediates/**/libsystem.so
